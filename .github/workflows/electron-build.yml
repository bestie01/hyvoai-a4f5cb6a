name: Build Electron Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_name: Hyvo-Stream-Studio-Setup
            artifact_ext: exe
          - os: macos-latest
            platform: mac
            artifact_name: Hyvo-Stream-Studio
            artifact_ext: dmg
          - os: ubuntu-latest
            platform: linux
            artifact_name: Hyvo-Stream-Studio
            artifact_ext: AppImage

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Add Electron platform
        run: npx cap add electron
        continue-on-error: true

      - name: Sync Electron
        run: npx cap sync electron

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Install electron-builder
        working-directory: electron
        run: npm install --save-dev electron-builder

      - name: Configure electron-builder
        working-directory: electron
        run: |
          cat > electron-builder.json << 'EOF'
          {
            "appId": "app.lovable.016291d698de4ca99131b756a44a0c02",
            "productName": "Hyvo Stream Studio",
            "directories": {
              "output": "dist"
            },
            "files": [
              "app/**/*",
              "capacitor.config.json",
              "!node_modules/**/*"
            ],
            "win": {
              "target": ["nsis"],
              "icon": "app/icons/appIcon.png",
              "artifactName": "Hyvo-Stream-Studio-Setup-${version}.${ext}"
            },
            "mac": {
              "target": ["dmg"],
              "category": "public.app-category.video",
              "icon": "app/icons/appIcon.png",
              "artifactName": "Hyvo-Stream-Studio-${version}.${ext}"
            },
            "linux": {
              "target": ["AppImage"],
              "category": "Video",
              "icon": "app/icons/appIcon.png",
              "artifactName": "Hyvo-Stream-Studio-${version}.${ext}"
            },
            "nsis": {
              "oneClick": false,
              "allowToChangeInstallationDirectory": true,
              "createDesktopShortcut": true,
              "createStartMenuShortcut": true
            }
          }
          EOF

      - name: Add build scripts to package.json
        working-directory: electron
        shell: bash
        run: |
          npm pkg set scripts.build:win="electron-builder --windows --config electron-builder.json"
          npm pkg set scripts.build:mac="electron-builder --mac --config electron-builder.json"
          npm pkg set scripts.build:linux="electron-builder --linux --config electron-builder.json"

      - name: Create app icon directory
        working-directory: electron
        run: mkdir -p app/icons

      - name: Copy app icon
        run: cp public/app-icon-1024.png electron/app/icons/appIcon.png

      - name: Build installer (Windows)
        if: matrix.platform == 'win'
        working-directory: electron
        run: npm run build:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build installer (macOS)
        if: matrix.platform == 'mac'
        working-directory: electron
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build installer (Linux)
        if: matrix.platform == 'linux'
        working-directory: electron
        run: npm run build:linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List built files
        working-directory: electron/dist
        run: ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ matrix.platform }}
          path: electron/dist/*.${{ matrix.artifact_ext }}
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.AppImage
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
