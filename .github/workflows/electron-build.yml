name: Build Electron Installers

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: win
            artifact_name: Hyvo-Stream-Studio-Setup
            artifact_ext: exe
          - os: macos-latest
            platform: mac
            artifact_name: Hyvo-Stream-Studio
            artifact_ext: dmg
          - os: ubuntu-latest
            platform: linux
            artifact_name: Hyvo-Stream-Studio
            artifact_ext: AppImage

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Setup Electron directory
        run: |
          mkdir -p electron/app
          mkdir -p electron/app/icons
          cp -r dist/* electron/app/
          cp public/app-icon-1024.png electron/app/icons/appIcon.png

      - name: Copy Electron source files
        run: |
          cp electron/package.json electron/package.json.bak || true
          cp -r electron/src electron/src.bak || true

      - name: Install Electron dependencies
        working-directory: electron
        run: npm install

      - name: Configure electron-builder with auto-update
        working-directory: electron
        run: |
          cat > electron-builder.json << 'EOF'
          {
            "appId": "com.hyvo.streamstudio",
            "productName": "Hyvo Stream Studio",
            "directories": {
              "output": "dist"
            },
            "files": [
              "src/**/*",
              "app/**/*"
            ],
            "publish": {
              "provider": "github",
              "owner": "${{ github.repository_owner }}",
              "repo": "${{ github.event.repository.name }}",
              "releaseType": "release"
            },
            "win": {
              "target": ["nsis"],
              "icon": "app/icons/appIcon.png",
              "artifactName": "Hyvo-Stream-Studio-Setup-${version}.${ext}"
            },
            "mac": {
              "target": ["dmg", "zip"],
              "category": "public.app-category.video",
              "icon": "app/icons/appIcon.png",
              "artifactName": "Hyvo-Stream-Studio-${version}.${ext}"
            },
            "linux": {
              "target": ["AppImage", "deb"],
              "category": "Video",
              "icon": "app/icons/appIcon.png",
              "artifactName": "Hyvo-Stream-Studio-${version}.${ext}"
            },
            "nsis": {
              "oneClick": false,
              "allowToChangeInstallationDirectory": true,
              "createDesktopShortcut": true,
              "createStartMenuShortcut": true
            }
          }
          EOF

      - name: Build installer (Windows)
        if: matrix.platform == 'win'
        working-directory: electron
        run: npx electron-builder --windows --config electron-builder.json --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build installer (macOS)
        if: matrix.platform == 'mac'
        working-directory: electron
        run: npx electron-builder --mac --config electron-builder.json --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build installer (Linux)
        if: matrix.platform == 'linux'
        working-directory: electron
        run: npx electron-builder --linux --config electron-builder.json --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List built files
        working-directory: electron/dist
        run: ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ matrix.platform }}
          path: |
            electron/dist/*.${{ matrix.artifact_ext }}
            electron/dist/*.zip
            electron/dist/*.deb
            electron/dist/latest*.yml
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/latest*.yml
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
